name: CI

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]

jobs:
  leak-gate:
    name: Leak gate (gitleaks + forbidden files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: No secret-bearing files in the tree
        run: |
          FOUND=$(find . \( -name ".env" -o -name ".env.local" -o -name ".env.production" -o -name "*.pem" -o -name "id_rsa*" -o -name "*.p12" \) -not -path "./.git/*")
          if [ -n "$FOUND" ]; then echo "Forbidden files:"; echo "$FOUND"; exit 1; fi
      - name: gitleaks (CLI direkt — die Action verlangt fuer Orgs einen Lizenz-Key)
        run: |
          docker run --rm -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks@sha256:b109bc5f8f76a38196a3e413704fc5b9e3c32360bce4e4b603bd6f45b3721dbb \
            dir /repo --no-banner --exit-code 1

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[test]"

      - name: Run tests
        run: pytest -x --tb=short -q

  frontend-v2:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"  # muss zum Runtime-Image passen (frontend Dockerfile: node:22)
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:run

  deploy-portability:
    name: Fresh-boot E2E (setup.sh → migrations → register)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Prepare ~/.mc for the container user
        # Runner-UID (1001) != Container-UID (mcuser 1000): das ${HOME}/.mc
        # Bind-Mount muss fuer den Containernutzer beschreibbar sein
        # (vault/agents/deliverables werden zur Laufzeit angelegt).
        run: mkdir -p ~/.mc && chmod 777 ~/.mc
      - name: docker compose config validates
        run: |
          ./setup.sh   # nur fuer die config-Validierung; install.sh ruft es erneut (idempotent)
          docker compose config -q
      - name: setup.ps1 parses (Windows path is experimental but must not be broken)
        shell: pwsh
        run: $null = [scriptblock]::Create((Get-Content -Raw setup.ps1))
      - name: install.sh — the advertised one-liner IS the tested path
        # Baut + bootet den vollen Stack, laeuft Migrationen, wartet auf health.
        run: ./install.sh --here
      - name: Register first admin + authenticated API call
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:8000/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@example.com","password":"ci-test-password-123","name":"CI"}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")
          test -n "$TOKEN"
          curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:8000/api/v1/boards >/dev/null
          echo "fresh-boot E2E OK"
      - name: Logs on failure
        if: failure()
        run: docker compose logs backend db --tail=80

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build backend image
        run: docker build -t mc-backend-test ./backend

      - name: Build frontend-v2 image
        run: docker build -t mc-frontend-v2-test ./frontend-v2
