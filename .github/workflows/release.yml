name: Release Images

# Baut + pusht die offiziellen Images nach GHCR, damit Nutzer pullen statt
# lokal bauen (Install-Zeit ~10min -> ~1min, halbe Fehlerklasse weg).
# Laeuft NUR im oeffentlichen Repo: im privaten Dev-Repo haette GITHUB_TOKEN
# keine Schreibrechte auf ghcr.io/argyelan-ai/* und jeder Tag-Push waere rot.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  images:
    if: github.repository == 'argyelan-ai/mission-control'
    name: Build & push (${{ matrix.image }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: mc-backend
            context: ./backend
          - image: mc-frontend
            context: ./frontend-v2
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/argyelan-ai/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          # arm64 fuer Mac-/Pi-Self-Hoster, amd64 fuer den Rest.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
