# CasaOS app manifest (Vorbereitung fuer die Einreichung in den
# CasaOS-AppStore — github.com/IceWhaleTech/CasaOS-AppStore).
# CasaOS erwartet ein compose-basiertes Format mit x-casaos-Metadaten.
# HINWEIS: CasaOS kann kein setup.sh ausfuehren — Secrets werden hier als
# Pflicht-Umgebungsvariablen deklariert, die der Nutzer beim Installieren
# setzt. Einreichung: dieses File + Screenshots als PR in deren Repo.
#
# Topologie: Der Browser MUSS ueber den proxy-Service rein (:80 im
# Container), der /api/* ans Backend und alles andere ans Frontend routet —
# das Frontend-Image macht relative API-Calls (same-origin). Frontend
# direkt exponieren funktioniert NICHT.
name: mission-control
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mc
      POSTGRES_PASSWORD: $DB_PASSWORD
      POSTGRES_DB: mission_control
    volumes:
      - /DATA/AppData/mission-control/db:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "$REDIS_PASSWORD"]
  backend:
    image: ghcr.io/argyelan-ai/mc-backend:0.1.1@sha256:5c9d24bbe7271c35e3db240c3e1ed0c20ca1a60ec7d512f6ae8818a004a53cf2
    restart: unless-stopped
    depends_on: [db, redis]
    environment:
      DATABASE_URL: postgresql+asyncpg://mc:$DB_PASSWORD@db:5432/mission_control
      REDIS_URL: redis://:$REDIS_PASSWORD@redis:6379/0
      JWT_SECRET_KEY: $JWT_SECRET_KEY
      SECRETS_ENCRYPTION_KEY: $SECRETS_ENCRYPTION_KEY
      ENVIRONMENT: production
    volumes:
      - /DATA/AppData/mission-control/mc:/home/mcuser/.mc
  frontend:
    image: ghcr.io/argyelan-ai/mc-frontend:0.1.1@sha256:0e5c3b4893e168b159b0288205db78b900f6e6d83fbd7fb091e19790a8c7f607
    restart: unless-stopped
    depends_on: [backend]
  proxy:
    # Same-origin-Router (wie der Caddy-Service im Haupt-Compose): /api/*
    # und /health gehen ans Backend, der Rest ans Frontend. Config wird
    # inline erzeugt, weil Kataloge keine Repo-Dateien mounten koennen.
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [frontend, backend]
    ports:
      - "3217:80"
    command:
      - sh
      - -c
      - |
        cat > /etc/caddy/Caddyfile <<'EOF'
        :80 {
          encode gzip zstd
          handle /api/* {
            reverse_proxy backend:8000
          }
          handle /health {
            reverse_proxy backend:8000
          }
          handle {
            reverse_proxy frontend:3000
          }
        }
        EOF
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
x-casaos:
  architectures: [amd64, arm64]
  main: proxy
  author: argyelan-ai
  category: AI
  port_map: "3217"
  scheme: http
  title:
    en_us: Mission Control
  description:
    en_us: >-
      Self-hosted command center for AI agent fleets — create agents,
      dispatch tasks over Kanban boards, watch them ship.
  tagline:
    en_us: Your AI agent fleet, on your hardware.
  developer: argyelan-ai
  icon: https://raw.githubusercontent.com/argyelan-ai/mission-control/main/frontend-v2/src/app/icon.png
  screenshot_link:
    - https://raw.githubusercontent.com/argyelan-ai/mission-control/main/docs/assets/mc-home.png
    - https://raw.githubusercontent.com/argyelan-ai/mission-control/main/docs/assets/mc-sessions.png
    - https://raw.githubusercontent.com/argyelan-ai/mission-control/main/docs/assets/mc-agents.png
