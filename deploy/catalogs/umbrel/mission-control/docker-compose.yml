# Umbrel package for Mission Control.
#
# Topology: the browser must enter through the `proxy` service (Caddy on
# :80), which routes /api/* and /health to the backend and everything else
# to the frontend — the frontend image makes relative (same-origin) API
# calls, so exposing it directly does not work.
#
# Images are pinned tag@digest (multi-arch amd64+arm64, verified with the
# registry API) as required by the Umbrel packaging guidelines.
version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mission-control_proxy_1
      APP_PORT: 80
      # Mission Control has its own login (first-run wizard creates the
      # admin account), so Umbrel's proxy auth would double-gate the app.
      PROXY_AUTH_ADD: "false"

  db:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    user: "1000:1000"
    environment:
      POSTGRES_USER: mc
      POSTGRES_PASSWORD: ${APP_MISSION_CONTROL_DB_PASSWORD}
      POSTGRES_DB: mission_control
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/lib/postgresql/data
    restart: on-failure

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    command: ["redis-server", "--requirepass", "${APP_MISSION_CONTROL_REDIS_PASSWORD}"]
    restart: on-failure

  backend:
    image: ghcr.io/argyelan-ai/mc-backend:0.1.1@sha256:5c9d24bbe7271c35e3db240c3e1ed0c20ca1a60ec7d512f6ae8818a004a53cf2
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://mc:${APP_MISSION_CONTROL_DB_PASSWORD}@db:5432/mission_control
      REDIS_URL: redis://:${APP_MISSION_CONTROL_REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET_KEY: ${APP_MISSION_CONTROL_JWT_SECRET}
      SECRETS_ENCRYPTION_KEY: ${APP_MISSION_CONTROL_FERNET_KEY}
      ENVIRONMENT: production
    volumes:
      - ${APP_DATA_DIR}/data/mc:/home/mcuser/.mc
    restart: on-failure

  frontend:
    image: ghcr.io/argyelan-ai/mc-frontend:0.1.1@sha256:0e5c3b4893e168b159b0288205db78b900f6e6d83fbd7fb091e19790a8c7f607
    depends_on:
      - backend
    restart: on-failure

  proxy:
    # Same-origin router (mirrors the Caddy service of the main compose).
    # The config is generated inline because catalog deployments cannot
    # mount files from the app repo.
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    depends_on:
      - frontend
      - backend
    command:
      - sh
      - -c
      - |
        cat > /etc/caddy/Caddyfile <<'EOF'
        :80 {
          encode gzip zstd
          handle /api/* {
            reverse_proxy backend:8000
          }
          handle /health {
            reverse_proxy backend:8000
          }
          handle {
            reverse_proxy frontend:3000
          }
        }
        EOF
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    restart: on-failure
