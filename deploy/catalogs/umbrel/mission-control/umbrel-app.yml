category: ai
name: Mission Control
version: "0.1.0"
tagline: Your AI agent fleet, on your hardware
description: >-
  Mission Control is a self-hosted command center for AI agent fleets.
  Create agents, dispatch tasks over Kanban boards, and watch them ship —
  with live terminal sessions, a knowledge vault, budgets and cost
  tracking, and support for multiple runtimes (Claude Code, vLLM,
  LM Studio, OpenAI-compatible APIs).


  A first-run wizard walks you through creating the admin account and
  connecting an LLM provider. The catalog deployment runs the core stack;
  host-level agent runtimes (Docker fleet extras) are available on a
  manual install — see the project README.
