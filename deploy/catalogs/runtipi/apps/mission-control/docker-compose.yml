# Runtipi package for Mission Control (custom app store format).
#
# Topology: the browser must enter through the `mission-control` (proxy)
# service, which routes /api/* and /health to the backend and everything
# else to the frontend — the frontend image makes relative (same-origin)
# API calls, so exposing it directly does not work.
#
# NOTE: requires mc-backend >= 0.1.1 — the store generates a random string
# for MC_SECRETS_ENCRYPTION_KEY and 0.1.1 derives a proper Fernet key from
# it. Bump the image tags when 0.1.1 is released.
version: "3.7"

services:
  mission-control:
    # Same-origin router (Caddy) — the main service Runtipi exposes.
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    container_name: mission-control
    restart: unless-stopped
    depends_on:
      - mission-control-frontend
      - mission-control-backend
    ports:
      - ${APP_PORT}:80
    command:
      - sh
      - -c
      - |
        cat > /etc/caddy/Caddyfile <<'EOF'
        :80 {
          encode gzip zstd
          handle /api/* {
            reverse_proxy mission-control-backend:8000
          }
          handle /health {
            reverse_proxy mission-control-backend:8000
          }
          handle {
            reverse_proxy mission-control-frontend:3000
          }
        }
        EOF
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    networks:
      - tipi_main_network

  mission-control-db:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    container_name: mission-control-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mc
      POSTGRES_PASSWORD: ${MC_DB_PASSWORD}
      POSTGRES_DB: mission_control
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/lib/postgresql/data
    networks:
      - tipi_main_network

  mission-control-redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: mission-control-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${MC_REDIS_PASSWORD}"]
    networks:
      - tipi_main_network

  mission-control-backend:
    image: ghcr.io/argyelan-ai/mc-backend:0.1.0@sha256:11f7a8af325f73752809bb84a09f3cc593fa81525e97fefc7682025b5cf68755
    container_name: mission-control-backend
    restart: unless-stopped
    depends_on:
      - mission-control-db
      - mission-control-redis
    environment:
      DATABASE_URL: postgresql+asyncpg://mc:${MC_DB_PASSWORD}@mission-control-db:5432/mission_control
      REDIS_URL: redis://:${MC_REDIS_PASSWORD}@mission-control-redis:6379/0
      JWT_SECRET_KEY: ${MC_JWT_SECRET_KEY}
      SECRETS_ENCRYPTION_KEY: ${MC_SECRETS_ENCRYPTION_KEY}
      ENVIRONMENT: production
    volumes:
      - ${APP_DATA_DIR}/data/mc:/home/mcuser/.mc
    networks:
      - tipi_main_network

  mission-control-frontend:
    image: ghcr.io/argyelan-ai/mc-frontend:0.1.0@sha256:deecaea941d1da1367a826c23b8ef48608cb906f011960f8b3acf96db0a308f7
    container_name: mission-control-frontend
    restart: unless-stopped
    depends_on:
      - mission-control-backend
    networks:
      - tipi_main_network

networks:
  tipi_main_network:
    external: true
