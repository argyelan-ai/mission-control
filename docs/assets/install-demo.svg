<svg xmlns="http://www.w3.org/2000/svg" width="820" height="430" viewBox="0 0 820 430" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .line { font-size: 14px; opacity: 0; }
      .dim  { fill: #8A8A8A; }
      .ok   { fill: #2B9A4A; }
      .teal { fill: #0FA3A3; }
      .txt  { fill: #D6D6D6; }
    </style>
  </defs>

  <!-- window -->
  <rect width="820" height="430" rx="12" fill="#0A0A0A"/>
  <rect x="0.5" y="0.5" width="819" height="429" rx="12" fill="none" stroke="#232323"/>
  <circle cx="24" cy="22" r="6" fill="#C23838"/>
  <circle cx="44" cy="22" r="6" fill="#B8870A"/>
  <circle cx="64" cy="22" r="6" fill="#2B9A4A"/>
  <text x="410" y="27" fill="#6E6E6E" font-size="12" text-anchor="middle">mission control — install</text>
  <line x1="0" y1="42" x2="820" y2="42" stroke="#1C1C1C"/>

  <!-- prompt + typed command -->
  <text x="24" y="76" class="teal" font-size="14">$</text>
  <text x="42" y="76" class="txt" font-size="14">
    curl -fsSL https://raw.githubusercontent.com/argyelan-ai/mission-control/main/install.sh | bash
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.01;0.06" dur="16s" repeatCount="indefinite"/>
  </text>

  <g>
    <text x="24" y="112" class="line teal" font-weight="bold">🚀 Mission Control installer
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.10;0.12;0.97;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="24" y="140" class="line ok">✓ prerequisites ok (git, docker, compose v2, openssl)
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.14;0.16;0.97;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="24" y="168" class="line dim">Install directory [./mission-control]:
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.18;0.20;0.97;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="24" y="196" class="line dim">Your name (how agents address you) [Operator]: <tspan class="txt">Sam</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.24;0.26;0.97;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="24" y="224" class="line ok">✅ .env created with generated secrets
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.30;0.32;0.97;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="24" y="252" class="line teal">→ using prebuilt images, starting the stack ...
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.36;0.38;0.97;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="24" y="280" class="line teal">→ waiting for the API (migrations run inside the backend on start) ...
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.50;0.52;0.97;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="24" y="322" class="line ok" font-weight="bold">✅ Mission Control is running!
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.62;0.64;0.97;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="24" y="354" class="line txt">1. Open <tspan class="teal">http://localhost</tspan> and register the first admin user.
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.68;0.70;0.97;1" dur="16s" repeatCount="indefinite"/></text>
    <text x="24" y="382" class="line txt">2. First agent: docs/setup/first-agent.md
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.72;0.74;0.97;1" dur="16s" repeatCount="indefinite"/></text>
  </g>

  <!-- blinking cursor -->
  <rect x="24" y="398" width="9" height="16" fill="#0FA3A3">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
