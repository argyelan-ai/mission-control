# PostgreSQL Client Authentication
#
# Network connections require password auth (scram-sha-256) — the backend
# authenticates with DB_PASSWORD from .env. The DB port is additionally bound
# to 127.0.0.1 on the host (docker-compose.yml), but auth must never rely on
# network isolation alone.

# Unix socket (local psql inside the db container, e.g. `docker compose exec db psql`)
local   all   all                 trust

# Docker network (backend container) — password required
host    all   all   0.0.0.0/0     scram-sha-256

# IPv6
host    all   all   ::0/0         scram-sha-256
