<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="fonts/embedded-fonts.css">
<link rel="stylesheet" href="shared.css">
<style>
.top { position:absolute; left:64px; right:64px; top:44px;
  display:flex; justify-content:space-between; align-items:flex-end; }
.top h1 { font-family:'Clash Display',sans-serif; font-weight:600; font-size:52px;
  letter-spacing:-0.02em; margin-top:14px; }
.top .meta { text-align:right; font-family:'JetBrains Mono',monospace;
  font-size:19px; color:var(--muted); letter-spacing:.08em; line-height:1.9;
  text-transform:uppercase; }
.top .meta b { color:var(--text2); font-weight:500; }
.slot { position:absolute; top:290px; width:872px; height:560px;
  background:#090B10; border:1px solid #232838; }
.slot.a { left:64px; } .slot.b { right:64px; }
.slot .ph { position:absolute; inset:0; display:flex; align-items:center;
  justify-content:center; font-family:'JetBrains Mono',monospace; font-size:22px;
  color:#2E3444; letter-spacing:.3em; }
.chip { position:absolute; top:236px; width:872px; display:flex;
  justify-content:space-between; align-items:center; }
.chip.a { left:64px; } .chip.b { right:64px; }
.chip .model { font-family:'JetBrains Mono',monospace; font-size:23px;
  color:var(--text); letter-spacing:.08em; text-transform:uppercase;
  padding-left:18px; border-left:3px solid var(--cyan); }
.chip .speed { font-family:'JetBrains Mono',monospace; font-size:21px;
  color:var(--cyan); letter-spacing:.05em; }
.bottom { position:absolute; left:64px; right:64px; bottom:44px;
  display:flex; justify-content:space-between; align-items:center; }
.prompt { font-family:'JetBrains Mono',monospace; font-size:19px; color:var(--muted);
  letter-spacing:.05em; max-width:1150px; white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; }
.prompt b { color:var(--text2); font-weight:500; }
</style></head><body>
<div class="ticks-x"></div><div class="ticks-y"></div>
<div class="top">
  <div>
    <span class="label">argyelan <span class="accent">/</span> llm bench · run {{RUN_LABEL}}</span>
    <h1>{{TITLE}}</h1>
  </div>
  <div class="meta">one prompt · one shot<br><b>{{MODE_LINE}}</b></div>
</div>
<div class="chip a"><span class="model">{{MODEL_A}}</span><span class="speed">{{TAG_A}}</span></div>
<div class="chip b"><span class="model">{{MODEL_B}}</span><span class="speed">{{TAG_B}}</span></div>
<div class="slot a"><div class="ph">VIDEO A</div></div>
<div class="slot b"><div class="ph">VIDEO B</div></div>
<div class="bottom">
  <div class="prompt"><b>PROMPT</b> — {{PROMPT_LINE}}</div>
  <div class="brandmark"><span class="sq"></span><span class="name">argyelan<b>.ai</b></span></div>
</div>
</body></html>
