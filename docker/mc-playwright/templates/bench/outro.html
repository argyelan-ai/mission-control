<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="fonts/embedded-fonts.css">
<link rel="stylesheet" href="shared.css">
<style>
.content { position:absolute; left:120px; top:130px; right:120px; }
.kicker { display:flex; align-items:center; gap:20px; margin-bottom:40px; }
.kicker .tick { width:44px; height:2px; background:var(--cyan); }
h1 { font-family:'Clash Display',sans-serif; font-weight:600; font-size:96px;
  letter-spacing:-0.02em; }
.table { margin-top:70px; width:1450px; font-family:'JetBrains Mono',monospace; }
.row { display:grid; grid-template-columns: 430px 180px 180px 180px 320px;
  padding:26px 28px; border-bottom:1px solid var(--line); align-items:baseline; }
.row.head { color:var(--muted); font-size:18px; letter-spacing:.08em;
  text-transform:uppercase; border-bottom:1px solid #232838; }
.row .name { font-size:27px; color:var(--text); }
.row .val { font-size:25px; color:var(--text2); }
.cta { position:absolute; right:120px; bottom:96px; text-align:right; }
.cta .follow { font-family:'Clash Display',sans-serif; font-weight:500; font-size:40px;
  letter-spacing:-0.01em; margin-bottom:18px; }
.cta .follow span { color:var(--cyan); }
.cta .meta { font-family:'JetBrains Mono',monospace; font-size:20px;
  color:var(--muted); letter-spacing:.08em; text-transform:uppercase; }
.judge { position:absolute; left:120px; bottom:96px;
  font-family:'JetBrains Mono',monospace; font-size:20px; color:var(--muted);
  letter-spacing:.08em; text-transform:uppercase; }
.judge b { color:var(--text2); }
</style></head><body>
<div class="ticks-x"></div><div class="ticks-y"></div>
<div class="content">
  <div class="kicker"><span class="tick"></span>
    <span class="label">argyelan <span class="accent">/</span> llm bench · run {{RUN_LABEL}} · results</span></div>
  <h1>The numbers.</h1>
  <div class="table">
    <div class="row head"><span>Model</span><span>Time</span><span>Size</span><span>Cost</span><span>Tokens</span></div>
    {{ROWS}}
  </div>
</div>
<div class="judge">JUDGE: <b>YOUR EYES</b> — WHICH ONE WINS? ↓</div>
<div class="cta">
  <div class="follow">local llm benchmarks, <span>weekly.</span></div>
  <div class="meta">argyelan.ai</div>
</div>
</body></html>
